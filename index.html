<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Alguém Especial ❤️</title>

    <link rel="stylesheet" href="css/style.css?v=2">
</head>

<body>
    <div class="container">

        <div id="area-envelope" class="secao ativa">
            <div class="envelope-box">
                <img id="img-dinamica-envelope" src="img/Envelope_fechado.jpeg" alt="Envelope">
                <div id="legenda-guia" class="legenda">Clique para abrir 💌</div>
            </div>
        </div>

        <div id="area-cartao" class="secao escondida">
            <div class="cena-3d">
                <div class="cartao-3d" id="meuCartao">

                    <div class="face frente">
                        <div class="frase-linda">Um buquê para a dona dos cachos mais lindos... 🌸</div>
                        <img src="img/Urso_frente.jpeg" alt="Urso e Lírios">
                        <div class="dica-final">E a surpresa ainda não acabou... <br> Clique para ver o que sinto ❤️
                        </div>
                    </div>

                    <div class="face verso">
                        <img src="img/Urso_verso_poema.jpeg" alt="Poema">
                        <div class="dica-verso">Toque para ver novamente 🔄</div>
                    </div>

                </div>
            </div>
        </div>

    </div>
    <script src="js/script.js"></script>
</body>

</html>
